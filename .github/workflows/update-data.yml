name: Atualizar Dados do Brasileirão

on:
  schedule:
    # Diariamente às 10:00 UTC (07:00 BRT)
    - cron: '0 10 * * *'
  workflow_dispatch: # Permite trigger manual pela aba Actions

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Instalar dependências
        run: pip install -r scripts/requirements.txt

      - name: Buscar dados ESPN (partidas)
        run: python scripts/fetch_espn.py

      - name: Buscar dados Transfermarkt (mercado)
        run: python scripts/fetch_transfermarkt.py

      - name: Buscar dados históricos (semanal)
        run: python scripts/fetch_historico.py
        if: github.event.schedule != '' && contains('0', github.run_number)
        continue-on-error: true

      - name: Commit dados atualizados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/brasileirao.json data/market-values.json data/historico.json
          git diff --staged --quiet || git commit -m "chore: atualizar dados $(date -u +%Y-%m-%d)"
          git pull --rebase -X theirs origin main || true
          git push
